<!DOCTYPE html>
<html>
<head>
<title>Valorant Card Game PvP</title>
<style>
/* BODY + BACKGROUND */
body {
    margin: 0;
    color: white;
    font-family: Arial;
    text-align: center;
    background: url("https://raw.githubusercontent.com/davidoroids47/card-images/main/Background.png") no-repeat center center fixed;
    background-size: cover;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(3px);
    z-index: -1;
}

/* GAME AREA */
#game {
    position: relative;
}

/* LANES + BUTTONS WRAPPER */
.game-area {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    max-width: 900px;
    margin: 0 auto;
}
.fade-out {
opacity: 0;
transform: scale(0.8);
transition: all 0.5s ease;
}
.board-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ROW + LANES */
.row {
    display: flex;
    justify-content: center;
    margin: 20px;
}

.lane {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 10px;
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 15px;
}

/* CARD SLOTS */
.slot {
    width: 130px;
    height: 170px;
    border: 2px dashed rgba(255,255,255,0.3);
    margin: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    font-size: 12px;
    border-radius: 14px;
    transition: all 0.2s ease;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}

.slot:hover {
    border-color: rgba(255,255,255,0.7);
    transform: scale(1.04);
}

.place-slot {
    font-size: 60px;
    color: rgba(255,255,255,0.25);
    font-weight: bold;
}

.place-slot:hover {
    color: rgba(255,255,255,0.8);
}

.enemy-slot {
    font-size: 60px;
    color: rgba(255,255,255,0.5);
    font-weight: bold;
}
/* HAND */
.hand {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

/* CONTROLS */
.controls {
display: flex;
flex-direction: column;
gap: 15px;
}
.confirm-btn {
    padding: 18px 28px;
    font-size: 18px;
    font-weight: bold;
    background: #2ecc71;
    border: none;
    border-radius: 10px;
    color: black;
    cursor: pointer;
    transition: 0.2s;
}

.confirm-btn:hover {
    background: #27ae60;
    transform: scale(1.05);
}
.confirm-btn:disabled {
    background: #555;
    color: #777;
    cursor: not-allowed;
    transform: none;
}

/* CARD IMAGES FULL SIZE */
.slot img {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 10px;
pointer-events: none;
transition: transform 0.2s ease;
}

.slot:hover img {
transform: scale(1.05);
}

.volume-control {
position: fixed;
top: 20px;
right: 20px;
background: rgba(0,0,0,0.6);
padding: 8px 12px;
border-radius: 10px;
font-size: 14px;
z-index: 10;
}

.volume-control input {
cursor: pointer;
}

.how-to-btn {
    display: inline-block;
    padding: 16px 44px;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    background: transparent;
    border: 2px solid #ff4655;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    margin-bottom: 10px;
    box-shadow: 0 0 8px rgba(255, 70, 85, 0.3), inset 0 0 8px rgba(255, 70, 85, 0.05);
}

.how-to-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 70, 85, 0.25), transparent);
    transition: left 0.5s ease;
}

.how-to-btn:hover {
    background: rgba(255, 70, 85, 0.15);
    border-color: #ff6b7a;
    box-shadow: 0 0 20px rgba(255, 70, 85, 0.6), 0 0 40px rgba(255, 70, 85, 0.25), inset 0 0 15px rgba(255, 70, 85, 0.1);
    transform: scale(1.06);
    text-shadow: 0 0 10px rgba(255, 70, 85, 0.7);
}

.how-to-btn:hover::before {
    left: 100%;
}

.how-to-btn:active {
    transform: scale(0.97);
    box-shadow: 0 0 10px rgba(255, 70, 85, 0.4), inset 0 0 20px rgba(255, 70, 85, 0.2);
}

#result {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 3px;
    opacity: 0;
    z-index: 9999;
    transition: all 0.4s ease;
}

#result.win {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.3);
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00ff88;
}

#result.lose {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.3);
    color: #ff4444;
    text-shadow: 0 0 10px #ff4444, 0 0 20px #ff4444, 0 0 40px #ff0000;
}
#special-hand {
    border-top: 2px solid rgba(255,255,255,0.2);
    padding-top: 10px;
}

.card {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px) scale(1.08);
    box-shadow: 0 10px 20px rgba(0,0,0,0.6);
}

.selected {
    border: 3px solid #00ffcc !important;
    box-shadow: 0 0 15px #00ffcc;
}

/* ANIMATIONS */
@keyframes dealCard {
    0% { transform: translateX(-200px) translateY(60px) scale(0.3); opacity: 0; }
    100% { transform: translateX(0) translateY(0) scale(1); opacity: 1; }
}
.deal { animation: dealCard 0.4s ease; }

@keyframes playCard {
    0% { transform: scale(1) translateY(0); opacity: 1; }
    100% { transform: scale(0.7) translateY(-60px); opacity: 0; }
}
.playing { animation: playCard 0.3s ease forwards; }

.place-pop { animation: popIn 0.2s ease; }
@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
}

@keyframes hitFlash {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); background: rgba(255,0,0,0.4); }
    100% { transform: scale(1); }
}
.hit { animation: hitFlash 0.3s ease; }

/* SHATTER SYSTEM */
.slot { position: relative; overflow: hidden; }

.crack::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(120deg, transparent 48%, white 49%, transparent 51%),
        linear-gradient(60deg, transparent 48%, white 49%, transparent 51%),
        linear-gradient(30deg, transparent 48%, white 49%, transparent 51%);
    opacity: 0.8;
    pointer-events: none;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-3px); }
    100% { transform: translateX(0); }
}
.shake { animation: shake 0.2s; }

@keyframes shatter {
    0% { transform: scale(1) rotate(0deg); opacity: 1; }
    40% { transform: scale(1.1) rotate(3deg); }
    100% { transform: scale(0) rotate(-25deg); opacity: 0; }
}
.shatter { animation: shatter 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

.card-fly {
position: fixed;
width: 80px;
height: 120px;
z-index: 999;
pointer-events: none;
transition: all 0.4s ease;
}
.card-fly img { width: 100%; height: 100%; object-fit: cover; }

.dead-text {
    color: #ff2b2b;
    font-weight: bold;
    font-size: 16px;
    text-shadow: 0 0 5px #ff2b2b, 0 0 10px #ff0000;
}

@keyframes deadAppear {
    0% { opacity: 0; transform: scale(0.8); }
    40% { transform: scale(1.15); }
    100% { opacity: 1; transform: scale(1); }
}
.dead-animate { animation: deadAppear 0.35s ease; }

/* AGENT SELECTION */
#agent-options {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px 0;
}

#agent-options .card {
    width: 140px;
    aspect-ratio: 7 / 10;
    border-radius: 12px;
    overflow: hidden;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
}
#agent-options .card img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
#agent-options .card:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

#loading-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
    opacity: 0;
    z-index: 9999;
    transition: opacity 0.5s ease;
}
#loading-text.show { opacity: 1; }

@keyframes enemyFlip {
    0% { transform: rotateY(90deg) scale(0.8); opacity: 0; }
    50% { transform: rotateY(-10deg) scale(1.05); }
    100% { transform: rotateY(0deg) scale(1); opacity: 1; }
}
.enemy-reveal { animation: enemyFlip 0.4s ease forwards; backface-visibility: hidden; }

@keyframes actionFadeOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.7); }
}
.action-fade { animation: actionFadeOut 0.4s ease forwards; }

/* MODAL */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(6px);
    z-index: 20000; display: none; justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal-content {
    position: relative; max-width: 90vw; max-height: 90vh;
    background: #1a1a1a; border: 2px solid #333; border-radius: 12px;
    padding: 15px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
}
.modal-content img { max-width: 100%; max-height: 75vh; border-radius: 8px; }
.nav-arrow {
    position: absolute; bottom: 15px; font-size: 32px; color: white;
    cursor: pointer; opacity: 0.6; background: rgba(0,0,0,0.5);
    border-radius: 50%; width: 40px; height: 40px;
    display: flex; justify-content: center; align-items: center;
}
.nav-arrow.left { left: 15px; }
.nav-arrow.right { right: 15px; }
.close-modal {
    position: absolute; top: -15px; right: -15px; font-size: 24px;
    color: white; background: #ff4655; width: 35px; height: 35px;
    border-radius: 50%; display: flex; justify-content: center; align-items: center;
    cursor: pointer; font-weight: bold;
}

/* ===================== */
/* MULTIPLAYER LOBBY CSS */
/* ===================== */
#lobby-ui {
    margin-top: 20px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}
.lobby-box {
    background: rgba(0,0,0,0.8);
    border: 2px solid #ff4655;
    border-radius: 15px;
    padding: 30px;
    max-width: 400px;
    width: 90%;
    text-align: center;
}
.lobby-input {
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #222;
    color: white;
    width: 85%;
    margin: 10px 0;
}
.lobby-btn {
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    background: #ff4655;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    margin: 5px;
}
.lobby-btn:hover { background: #ff6b7a; transform: scale(1.05); }
.lobby-btn.secondary { background: #333; border: 1px solid #555; }
.lobby-btn:disabled { background: #444; color: #666; cursor: not-allowed; }

#room-code-display {
    color: #00ffcc;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
    user-select: all;
    margin: 10px 0;
}

.turn-indicator {
    position: fixed;
    top: 100px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.9);
    padding: 10px 20px;
    border-radius: 20px;
    border: 2px solid #00ffcc;
    color: #00ffcc;
    font-weight: bold;
    z-index: 500;
    display: none;
}

/* ALIGN FLASH */
@keyframes alignFlash {
    0% { box-shadow: 0 0 0px transparent; }
    50% { box-shadow: 0 0 20px #00ffcc, inset 0 0 15px rgba(0,255,204,0.3); }
    100% { box-shadow: 0 0 0px transparent; }
}
.align-flash { animation: alignFlash 0.5s ease; }

/* DECK INFO */
.deck-info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    color: #aaa;
    z-index: 10;
}
.deck-info span { color: #00ffcc; font-weight: bold; }

/* RESHUFFLE NOTIFICATION */
@keyframes reshuffleFlash {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
}
.reshuffle-notify {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: bold;
    color: #ffaa00;
    text-shadow: 0 0 10px #ffaa00, 0 0 20px #ff6600;
    z-index: 9998;
    pointer-events: none;
    animation: reshuffleFlash 1.8s ease forwards;
}
    .card.dragging {
    opacity: 0.35;
    transform: scale(0.9);
}
</style>
</head>

</audio>
<audio id="sfx-attack" src="https://raw.githubusercontent.com/davidoroids47/card-images/main/Attack.mp3"></audio>

<div class="volume-control">🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5"></div>

    <button class="how-to-btn" onclick="openHowToPlay()">How to Play</button>

        <img id="tutorial-img" src="https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg1.png" alt="Tutorial">
        <div class="nav-arrow left" onclick="prevSlide()">&#10094;</div>
        <div class="nav-arrow right" onclick="nextSlide()">&#10095;</div>
        <div class="page-indicator" id="page-indicator">1 / 9</div>
    </div>
</div>

<!-- GAME AREA -->
<div id="game" style="display:none;">
    <div class="game-area">
        <div id="result"></div>
        <div class="board-wrapper">
            <div class="row" id="lanes"></div>

const firebaseConfig = {

    appId: "1:806345391190:web:d3217beea6c4d7b987cff7",
    measurementId: "G-YJ9MRG34YY"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let roomRef = null;
let myId = null;
let isHost = false;

// =====================
// ORIGINAL SOUND & ASSETS
// =====================
const sfxAttack = document.getElementById("sfx-attack");
const sfxDeath = document.getElementById("sfx-death");
const bgMusic = document.getElementById("bg-music");
const musicSlider = document.getElementById("volumeSlider");
const sfxSlider = document.getElementById("sfxSlider");
const sfxPlace = document.getElementById("sfx-place");
const sfxHover = document.getElementById("sfx-hover");
const sfxSwap = document.getElementById("sfx-swap");
const sfxConfirm = document.getElementById("sfx-confirm");
const sfxStart = document.getElementById("sfx-start");
const sfxSelect = document.getElementById("sfx-select");

bgMusic.volume = musicSlider.value;
musicSlider.addEventListener("input", () => bgMusic.volume = musicSlider.value);
sfxSlider.addEventListener("input", () => {
    sfxAttack.volume = sfxSlider.value; sfxDeath.volume = sfxSlider.value;
    sfxPlace.volume = sfxSlider.value; sfxHover.volume = sfxSlider.value;
    sfxSwap.volume = sfxSlider.value; sfxConfirm.volume = sfxSlider.value * 0.8;
    sfxStart.volume = sfxSlider.value; sfxSelect.volume = sfxSlider.value;
});
document.addEventListener("click", () => bgMusic.play().catch(()=>{}), { once: true });

const tutorialImages = [
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg1.png",
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg2M.png",
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg3.png",
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg4.png",
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg5.png",
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg6.png",
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg7.png",
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg8.png",
    "https://raw.githubusercontent.com/davidoroids47/card-images/main/Pg9.png"
];
let currentSlide = 0;
window.openHowToPlay = () => { currentSlide = 0; updateSlide(); document.getElementById("how-to-modal").classList.add("show"); };
window.closeHowToPlay = (e) => { if(!e || e.target.id === "how-to-modal") document.getElementById("how-to-modal").classList.remove("show"); };
window.nextSlide = () => { if(currentSlide < tutorialImages.length - 1) { currentSlide++; updateSlide(); } };
window.prevSlide = () => { if(currentSlide > 0) { currentSlide--; updateSlide(); } };
function updateSlide() {
    document.getElementById("tutorial-img").src = tutorialImages[currentSlide];
    document.getElementById("page-indicator").innerText = `${currentSlide + 1} / ${tutorialImages.length}`;
    document.querySelector(".nav-arrow.left").style.visibility = currentSlide === 0 ? "hidden" : "visible";
    document.querySelector(".nav-arrow.right").style.visibility = currentSlide === tutorialImages.length - 1 ? "hidden" : "visible";
}

shuffle(agentDeck);

let justDiedEnemy = [false, false, false];

// Track if alignment is in progress to prevent listener conflicts
let alignmentInProgress = false;

// =====================
// UTILITY FUNCTIONS
// =====================
function shuffle(deck) {
    for (let i = deck.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }
}
function isAttack(card) { return card === "Attack"; }

// Check if a card belongs to the action deck (not a special role card)
function isFromActionDeck(cardName) {
    return cardName && !cardName.includes("Sentinel") && !cardName.includes("Initiator") && !cardName.includes("Controller");
}

function isCompatible(card, agentName) {
    if (!card || isAttack(card)) return false;
    return agentUtilities[agentName] && agentUtilities[agentName].includes(card.split(" (")[0]);
}
function getAliveCounts() {
    const playerAlive = playerAgents.map(a => a && a.hp > 0);
    const enemyAlive = enemyAgents.map(a => a && a.hp > 0);
    const p = playerAlive.filter(Boolean).length;
    const e = enemyAlive.filter(Boolean).length;
    return { playerAlive, enemyAlive, p, e };
}
function isValidSwap(a, b) {
    const { playerAlive, enemyAlive, p, e } = getAliveCounts();
    if (!playerAlive[a] || !playerAlive[b]) return false;
    if (p === 1 && e === 1) return false;
    if (p === 2 && e === 2) return enemyAlive[a] && enemyAlive[b];
    if (p === 3 && e === 3) return true;
    if (p === 2 && e === 1) return enemyAlive[b];
    if (p === 3 && e === 1) return true;
    if (p === 1 && e === 2) return enemyAlive[b];
    if (p === 1 && e === 3) return enemyAlive[b];
    return true;
}
function canPlaceCard(i) {
    const { playerAlive, enemyAlive, p, e } = getAliveCounts();
    if (!playerAlive[i]) return false;
    if (!enemyAlive[i]) return false;
    return true;
}
function isTurnValid() {
    const { playerAlive, enemyAlive, p, e } = getAliveCounts();
    if (p === 1 && e === 1) { for (let i = 0; i < 3; i++) if (enemyAlive[i] && !placedCards[i]) return false; }
    if (p === 2 && e === 2) { for (let i = 0; i < 3; i++) if (enemyAlive[i] && !placedCards[i]) return false; }
    if (p === 2 && e === 1) { for (let i = 0; i < 3; i++) if (enemyAlive[i] && !placedCards[i]) return false; }
    return true;
}

// =====================
// DISCARD & RESHUFFLE SYSTEM
// =====================
function discardHand() {
    // Move all remaining hand cards to discard deck
    discardDeck.push(...hand);
    hand = [];
}

function discardPlacedActionCards() {
    // Move placed cards that came from the action deck to discard
    for (let i = 0; i < 3; i++) {
        if (placedCards[i] && isFromActionDeck(placedCards[i].card)) {
            discardDeck.push(placedCards[i].card);
        }
        // Special cards (Deflect, Block, Draw2) are NOT recycled
    }
}

function checkReshuffle() {
    if (actionDeck.length <= 12 && discardDeck.length > 0) {
        actionDeck.push(...discardDeck);
        discardDeck = [];
        shuffle(actionDeck);
        showReshuffleNotification();
    }
}

function showReshuffleNotification() {
    let notify = document.createElement("div");
    notify.className = "reshuffle-notify";
    notify.innerText = "♻ DISCARD RESHUFFLED INTO DECK";
    document.body.appendChild(notify);
    setTimeout(() => notify.remove(), 2000);
}

function updateDeckInfo() {
    document.getElementById("deck-count").innerText = actionDeck.length;
    document.getElementById("discard-count").innerText = discardDeck.length;
}

// =====================
// AUTO-ALIGN SYSTEM
// =====================
function animateAgentMove(fromIndex, toIndex, isPlayer = true) {
    let lanes = document.getElementById("lanes").children;
    let fromSlot = lanes[fromIndex].children[isPlayer ? 3 : 0];
    let toSlot = lanes[toIndex].children[isPlayer ? 3 : 0];

    let agentEl = fromSlot.querySelector("img");
    if (!agentEl) return;

    let fromRect = agentEl.getBoundingClientRect();
    let toRect = toSlot.getBoundingClientRect();

    let dx = toRect.left - fromRect.left;
    let dy = toRect.top - fromRect.top;

    agentEl.style.transition = "transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
    agentEl.style.transform = `translate(${dx}px, ${dy}px)`;
    agentEl.style.zIndex = "100";
    agentEl.style.position = "relative";

    setTimeout(() => {
        agentEl.style.transition = "";
        agentEl.style.transform = "";
        agentEl.style.zIndex = "";
        agentEl.style.position = "";
    }, 420);
}

function autoAlignAgents() {
    let alivePlayer = playerAgents.filter(a => a && a.hp > 0);
    let aliveEnemy = enemyAgents.filter(a => a && a.hp > 0);

    while (alivePlayer.length < 3) alivePlayer.push({ hp: 0 });
    while (aliveEnemy.length < 3) aliveEnemy.push({ hp: 0 });

    let needsAlignment = false;
    for (let i = 0; i < 3; i++) {
        let pOld = (playerAgents[i] && playerAgents[i].hp > 0) ? playerAgents[i].name : null;
        let pNew = (alivePlayer[i] && alivePlayer[i].hp > 0) ? alivePlayer[i].name : null;
        let eOld = (enemyAgents[i] && enemyAgents[i].hp > 0) ? enemyAgents[i].name : null;
        let eNew = (aliveEnemy[i] && aliveEnemy[i].hp > 0) ? aliveEnemy[i].name : null;
        if (pOld !== pNew || eOld !== eNew) {
            needsAlignment = true;
            break;
        }
    }

    // Clear placed cards regardless
    placedCards = [null, null, null];
    enemyPlacedCards = [null, null, null];

    if (!needsAlignment) return Promise.resolve(false);

    alignmentInProgress = true;

    let lanes = document.getElementById("lanes").children;

    playerAgents.forEach((agent, oldIdx) => {
        if (agent && agent.hp > 0) {
            let newIdx = alivePlayer.indexOf(agent);
            if (newIdx !== oldIdx) {
                animateAgentMove(oldIdx, newIdx, true);
            }
        }
    });

    enemyAgents.forEach((agent, oldIdx) => {
        if (agent && agent.hp > 0) {
            let newIdx = aliveEnemy.indexOf(agent);
            if (newIdx !== oldIdx) {
                animateAgentMove(oldIdx, newIdx, false);
            }
        }
    });

    return new Promise(resolve => {
        setTimeout(() => {
            playerAgents = alivePlayer;
            enemyAgents = aliveEnemy;

            updateAgentsUI();
            updateEnemyUI();
            updateBoardUI();

            let newLanes = document.getElementById("lanes").children;
            let { playerAlive, enemyAlive } = getAliveCounts();
            for (let i = 0; i < 3; i++) {
                if (playerAlive[i] && enemyAlive[i]) {
                    newLanes[i].classList.add("align-flash");
                    setTimeout(() => newLanes[i].classList.remove("align-flash"), 500);
                }
            }

            alignmentInProgress = false;
            resolve(true);
        }, 450);
    });
}

        div.classList.remove("selected");
    } else {

        selectedAgents.push(agent);
        div.classList.add("selected");

    const ready = selectedAgents.length === 3;

    document.getElementById('status-text').innerText = ready ? "Ready to Play!" : "Select 3 Agents";
}

// =====================
// MULTIPLAYER LOGIC
// =====================
function generateRoomCode(length = 6) {
    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < length; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
    }
    return code;
}

window.createRoom = async function() {
    if (selectedAgents.length !== 3) return;

    isHost = true;
    myId = "p1";
    playerAgents = selectedAgents.map(a => ({ name: a, hp: 100 }));
    generateSpecialHand();
    initDecks();

    let code;
    let exists = true;
    let attempts = 0;

    while (exists && attempts < 30) {
        code = generateRoomCode(6);
        const snapshot = await get(ref(db, 'rooms/' + code));
        exists = snapshot.exists();
        attempts++;
    }

    if (exists) return alert("Couldn't generate a unique code. Try again.");

    roomRef = ref(db, 'rooms/' + code);

    const initialState = {
        status: "waiting",
        host: { agents: playerAgents },
        guest: { agents: [] },
        turn: 1,
        gameState: {
            p1: { agents: playerAgents, placed: [null,null,null], confirmed: false },
            p2: { agents: [], placed: [null,null,null], confirmed: false }
        }
    };

    set(roomRef, initialState);

    document.getElementById('lobby-menu').style.display = 'none';
    document.getElementById('waiting-menu').style.display = 'block';
    document.getElementById('room-code-display').innerText = code;

    listenForGameStart();
};

window.joinRoom = function() {
    if (selectedAgents.length !== 3) return;
    const roomId = document.getElementById('join-code-input').value.trim();
    if (!roomId) return alert("Enter Room Code!");

    const r = ref(db, 'rooms/' + roomId);
    
    get(r).then(snapshot => {
        if (!snapshot.exists()) return alert("Room not found!");
        const data = snapshot.val();
        if (data.status !== "waiting") return alert("Room full/started.");

        isHost = false;
        myId = "p2";
        roomRef = r;

        playerAgents = selectedAgents.map(a => ({ name: a, hp: 100 }));
        enemyAgents = data.host.agents; 
        generateSpecialHand();
        initDecks();

        const updates = {
            guest: { agents: playerAgents },
            status: "playing",
            ['gameState/p2']: { agents: playerAgents, placed: [null,null,null], confirmed: false }
        };

        update(r, updates);

        startGameLocal();
        listenForUpdates();
    }).catch(err => alert("Error: " + err.message));
};

window.copyCode = function() {
    const code = document.getElementById('room-code-display').innerText;
    navigator.clipboard.writeText(code).then(() => alert("Code copied!"));
};

function listenForGameStart() {
    onValue(roomRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        
        if (isHost && data.status === "playing" && !enemyAgents.length) {
            enemyAgents = data.guest.agents;
            startGameLocal();
            listenForUpdates(); 
        }
    });
}

function listenForUpdates() {
    const gameStateRef = child(roomRef, 'gameState');
    
    onValue(gameStateRef, (snapshot) => {
        const state = snapshot.val();
        if (!state) return;

        const oppId = myId === "p1" ? "p2" : "p1";
        const oppData = state[oppId];
        const myData = state[myId];

        if (oppData && oppData.agents && !alignmentInProgress) {
            let changed = false;
            for (let i = 0; i < 3; i++) {
                let oldName = (enemyAgents[i] && enemyAgents[i].hp > 0) ? enemyAgents[i].name : null;
                let newName = (oppData.agents[i] && oppData.agents[i].hp > 0) ? oppData.agents[i].name : null;
                let oldHp = enemyAgents[i] ? enemyAgents[i].hp : 0;
                let newHp = oppData.agents[i] ? oppData.agents[i].hp : 0;
                if (oldName !== newName || oldHp !== newHp) {
                    changed = true;
                    break;
                }
            }
            if (changed) {
                enemyAgents = oppData.agents;
                updateEnemyUI();
                autoAlignIfNeeded();
            }
        }

        if (myData && oppData && myData.confirmed && oppData.confirmed && !gameOver) {
            enemyPlacedCards = oppData.placed || [null,null,null];
            resolveMultiplayerTurn();
        }
        
        const indicator = document.getElementById("turn-indicator");
        if (myData && oppData) {
            if (myData.confirmed && !oppData.confirmed) {
                indicator.innerText = "Waiting for Opponent...";
                indicator.style.display = "block";
            } else if (!myData.confirmed && oppData.confirmed) {
                indicator.innerText = "Opponent is Ready!";
                indicator.style.display = "block";
            } else {
                indicator.style.display = "none";
            }
        }
    });
}

function autoAlignIfNeeded() {
    let alivePlayer = playerAgents.filter(a => a && a.hp > 0);
    let aliveEnemy = enemyAgents.filter(a => a && a.hp > 0);
    while (alivePlayer.length < 3) alivePlayer.push({ hp: 0 });
    while (aliveEnemy.length < 3) aliveEnemy.push({ hp: 0 });

    let needsAlign = false;
    for (let i = 0; i < 3; i++) {
        let pOld = (playerAgents[i] && playerAgents[i].hp > 0) ? playerAgents[i].name : null;
        let pNew = (alivePlayer[i] && alivePlayer[i].hp > 0) ? alivePlayer[i].name : null;
        let eOld = (enemyAgents[i] && enemyAgents[i].hp > 0) ? enemyAgents[i].name : null;
        let eNew = (aliveEnemy[i] && aliveEnemy[i].hp > 0) ? aliveEnemy[i].name : null;
        if (pOld !== pNew || eOld !== eNew) { needsAlign = true; break; }
    }

    if (needsAlign) {
        playerAgents = alivePlayer;
        enemyAgents = aliveEnemy;
        updateAgentsUI();
        updateEnemyUI();
        updateBoardUI();
    }
}

// =====================

// =====================
function initDecks() {
    actionDeck = Object.keys(cardImages)
        .filter(c => !c.includes("Sentinel") && !c.includes("Initiator") && !c.includes("Controller"))
        .concat(Array(10).fill("Attack"));
    shuffle(actionDeck);
    discardDeck = [];
    hand = [];
    drawCards();
}

function startGameLocal() {
    sfxStart.currentTime = 0; sfxStart.play().catch(()=>{});
    document.getElementById("agent-selection").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("deck-info").style.display = "block";
    
    createBoard();
    updateAgentsUI();
    updateEnemyUI();
    updateHandUI(true);
    updateSpecialHandUI();
    updateBoardUI();
    updateDeckInfo();
}

window.selectAgentSwap = function(i) {
    if (confirmedTurn) return;
    let lanes = document.getElementById("lanes").children;
    if (selectedAgentIndex === null) {
        if (playerAgents[i].hp === 0) return;
        selectedAgentIndex = i;
        lanes[i].children[3].classList.add("selected");
        return;
    }

    let a = selectedAgentIndex;
    let b = i;
    if (!isValidSwap(a, b)) {
        alert("Invalid swap: cannot move agent here due to lane rules.");
        lanes[a].children[3].classList.remove("selected");
        selectedAgentIndex = null;
        return;
    }
    lanes[a].children[3].classList.remove("selected");
    if (a === b) { selectedAgentIndex = null; return; }

    [playerAgents[a], playerAgents[b]] = [playerAgents[b], playerAgents[a]];
    [placedCards[a], placedCards[b]] = [placedCards[b], placedCards[a]];

    sfxSwap.currentTime = 0; sfxSwap.play().catch(()=>{});
    selectedAgentIndex = null;

    lanes[a].children[3].classList.add("shake");
    lanes[b].children[3].classList.add("shake");
    setTimeout(() => {
        lanes[a].children[3].classList.remove("shake");
        lanes[b].children[3].classList.remove("shake");
    }, 200);

    updateAgentsUI();
    updateBoardUI();
    
    syncGameUpdate();
}

window.placeCard = function(i) {
    if (isPlacingCard || confirmedTurn) return;
    if (selectedCardIndex === null && selectedSpecialIndex === null) return;
    if (playerAgents[i].hp === 0) return alert("Your agent is dead!");
    if (enemyAgents[i].hp === 0) return alert("No enemy here!");
    if (!canPlaceCard(i)) return alert("Cannot place here — must face at least one enemy!");
    if (placedCards[i]) return alert("Slot full!");

    isPlacingCard = true;
    const lanes = document.getElementById("lanes").children;
    const targetSlot = lanes[i].children[2];

    let card, cardEl;
    let wasSpecial = selectedSpecialIndex !== null;
    let removalIndex = wasSpecial ? selectedSpecialIndex : selectedCardIndex;

    if (wasSpecial) {
        cardEl = document.getElementById("special-hand").children[removalIndex];
        card = specialHand[removalIndex];
    } else {
        cardEl = document.getElementById("hand").children[removalIndex];
        card = hand[removalIndex];
    }
    if (!cardEl) { isPlacingCard = false; return; }

    // Draw 2 Logic
    if (card === "Draw2 (Initiator)") {
        bonusDraw += 2;
        sfxPlace.currentTime = 0; sfxPlace.play().catch(()=>{});
        placedCards[i] = { card: card };
        if (wasSpecial) specialHand.splice(removalIndex, 1);
        else hand.splice(removalIndex, 1);
        updateHandUI(false); updateSpecialHandUI(); updateBoardUI();
        isPlacingCard = false;
        return;
    }

    // Animation
    const rectStart = cardEl.getBoundingClientRect();
    const rectEnd = targetSlot.getBoundingClientRect();
    const flyingCard = cardEl.cloneNode(true);
    flyingCard.classList.add("card-fly");
    cardEl.style.visibility = "hidden";
    flyingCard.style.left = rectStart.left + "px";
    flyingCard.style.top = rectStart.top + "px";
    flyingCard.style.width = rectStart.width + "px";
    flyingCard.style.height = rectStart.height + "px";
    document.body.appendChild(flyingCard);
    flyingCard.offsetWidth;
    flyingCard.style.left = rectEnd.left + "px";
    flyingCard.style.top = rectEnd.top + "px";

    setTimeout(() => {
        sfxPlace.currentTime = 0; sfxPlace.play().catch(()=>{});
        placedCards[i] = { card: card };
        if (wasSpecial) specialHand.splice(removalIndex, 1);
        else hand.splice(removalIndex, 1);
        
        flyingCard.remove();
        updateHandUI(false); updateSpecialHandUI(); updateBoardUI();
        isPlacingCard = false;
    }, 400);
}

window.confirmTurn = function() {
    if (gameOver || confirmedTurn) return;
    if (!isTurnValid()) return alert("Invalid positioning! You cannot hide in an empty lane.");

    confirmedTurn = true;
    sfxConfirm.currentTime = 0; sfxConfirm.play().catch(()=>{});
    
    document.getElementById("confirm-btn").disabled = true;
    document.getElementById("confirm-btn").innerText = "Locked In!";

    updateBoardUI();
    updateHandUI(false);
    updateSpecialHandUI();

    const gameStateRef = child(roomRef, 'gameState');
    
    const updates = {};
    updates[`${myId}/agents`] = playerAgents;
    updates[`${myId}/placed`] = placedCards;
    updates[`${myId}/confirmed`] = true;
    
    update(gameStateRef, updates);
}

// =====================
// RESOLUTION
// =====================
async function resolveMultiplayerTurn() {
    if (gameOver) return;

    // 1. Reveal enemy cards
    revealEnemyCards();
    await new Promise(r => setTimeout(r, 1500)); 

    // 2. Resolve combat
    resolveCombat();
    
    // 3. Check for win/loss
    checkWin();
    
    // 4. Update UI to show deaths
    updateAgentsUI();
    updateEnemyUI();

    if (!gameOver) {
        await new Promise(r => setTimeout(r, 1200));
        fadeOutActionCards();
        await new Promise(r => setTimeout(r, 400));
        
        // 5. Auto-align agents
        await autoAlignAgents();
        
        // 6. DISCARD PHASE: discard placed action deck cards
        discardPlacedActionCards();
        
        // 7. DISCARD PHASE: discard all remaining hand cards
        discardHand();
        
        // 8. Check if action deck needs reshuffling from discard
        checkReshuffle();
        
        // 9. Draw fresh cards for next turn
        drawCards();
        
        // 10. Update deck info display
        updateDeckInfo();
        
        // 11. Reset turn state
        confirmedTurn = false;
        document.getElementById("confirm-btn").disabled = false;
        document.getElementById("confirm-btn").innerText = "Confirm Turn";
        updateBoardUI();
        updateHandUI(false);

        // 12. Sync new state to database
        const updates = {};
        updates[`${myId}/confirmed`] = false;
        updates[`${myId}/placed`] = [null,null,null];
        updates[`${myId}/agents`] = playerAgents;
        
        update(child(roomRef, 'gameState'), updates);
    }
}

function syncGameUpdate() {
    if (!roomRef) return;
    
    const gameStateRef = child(roomRef, 'gameState');
    
    const updates = {};
    updates[`${myId}/agents`] = playerAgents;
    updates[`${myId}/placed`] = placedCards;
    updates[`${myId}/confirmed`] = confirmedTurn;
    
    update(gameStateRef, updates);
}

function generateSpecialHand() {
    specialHand = [];
    let hasDuelistAttack = false;
    playerAgents.forEach(agent => {
        let role = agentRoles[agent.name];
        if (role === "Sentinel") specialHand.push("BlockAttack (Sentinel)");
        if (role === "Initiator") specialHand.push("Draw2 (Initiator)");
        if (role === "Controller") specialHand.push("Deflect (Controller)");
        if (role === "Duelist" && !hasDuelistAttack) {
            specialHand.push("Attack");
            hasDuelistAttack = true;
        }
    });
}

function drawCards() {
    // Always draw exactly 3 + bonusDraw fresh cards
    let drawCount = 3 + bonusDraw;
    for (let i = 0; i < drawCount; i++) {
        if (actionDeck.length === 0) {
            // Emergency reshuffle if deck runs out mid-draw
            if (discardDeck.length > 0) {
                actionDeck.push(...discardDeck);
                discardDeck = [];
                shuffle(actionDeck);
                showReshuffleNotification();
            } else break; // Truly no cards left
        }
        hand.push(actionDeck.pop());
    }
    bonusDraw = 0;
}

// =====================
// UI RENDERING
// =====================
function createBoard() {
    let lanesDiv = document.getElementById("lanes");
    lanesDiv.innerHTML = "";
    for (let i = 0; i < 3; i++) {
        let lane = document.createElement("div");
        lane.className = "lane";
        lane.innerHTML = `
            <div class="slot agent"></div>
            <div class="slot enemy-slot">?</div>
            <div class="slot place-slot" onclick="placeCard(${i})">+</div>
            <div class="slot agent" onclick="selectAgentSwap(${i})"></div>
        `;
        lanesDiv.appendChild(lane);
    }
}

function updateAgentsUI() {
    let lanes = document.getElementById("lanes").children;
    for (let i = 0; i < 3; i++) {
        let a = playerAgents[i];
        let div = lanes[i].children[3];
        div.innerHTML = "";
        if (!a || a.hp === 0) {
            if (justDiedPlayer[i]) {
                div.innerHTML = '<span class="dead-text dead-animate">DEAD</span>';
                justDiedPlayer[i] = false;
            } else div.innerHTML = '<span class="dead-text">DEAD</span>';
            continue;
        }
        let img = document.createElement("img");
        img.src = a.hp === 100 ? agentImages[a.name].full : agentImages[a.name].low;
        div.appendChild(img);
    }
}

function updateEnemyUI() {
    let lanes = document.getElementById("lanes").children;
    for (let i = 0; i < 3; i++) {
        let a = enemyAgents[i];
        let div = lanes[i].children[0];
        div.innerHTML = "";
        if (!a || a.hp === 0) {
            if (justDiedEnemy[i]) {
                div.innerHTML = '<span class="dead-text dead-animate">DEAD</span>';
                justDiedEnemy[i] = false;
            } else div.innerHTML = '<span class="dead-text">DEAD</span>';
            continue;
        }
        let img = document.createElement("img");
        img.src = a.hp === 100 ? agentImages[a.name].full : agentImages[a.name].low;
        div.appendChild(img);
    }
}

function updateHandUI(animate = false) {
    let handDiv = document.getElementById("hand");
    handDiv.innerHTML = "";
    hand.forEach((c, i) => {
        let d = document.createElement("div");
        d.addEventListener("mouseenter", () => {
            const hoverClone = sfxHover.cloneNode();
            hoverClone.volume = sfxHover.volume;
            hoverClone.play().catch(()=>{});
        });
        d.className = "slot card";
        if (cardImages[c]) {
            let img = document.createElement("img");
            img.src = cardImages[c];
            d.appendChild(img);
        } else d.innerText = c;
        if (animate) setTimeout(() => d.classList.add("deal"), i * 150);
        d.onclick = () => {
            if (confirmedTurn) return;
            selectedCardIndex = i;
            selectedSpecialIndex = null;
            document.querySelectorAll("#hand .card, #special-hand .card").forEach(el => el.classList.remove("selected"));
            d.classList.add("selected");
        };
                d.draggable = true;
        d.addEventListener("dragstart", (e) => {
            if (confirmedTurn) { e.preventDefault(); return; }
            selectedCardIndex = i;
            selectedSpecialIndex = null;
            e.dataTransfer.effectAllowed = "move";
            d.classList.add("dragging");
        });
        d.addEventListener("dragend", () => {
            d.classList.remove("dragging");
        });
        handDiv.appendChild(d);
    });
}

function updateSpecialHandUI() {
    let div = document.getElementById("special-hand");
    div.innerHTML = "";
    specialHand.forEach((card, i) => {
        let d = document.createElement("div");
        d.className = "slot card";
        if (cardImages[card]) {
            let img = document.createElement("img");
            img.src = cardImages[card];
            d.appendChild(img);
        } else d.innerText = card;
        d.onclick = () => {
            if (confirmedTurn) return;
            selectedSpecialIndex = i;
            selectedCardIndex = null;
            document.querySelectorAll("#hand .card, #special-hand .card").forEach(el => el.classList.remove("selected"));
            d.classList.add("selected");
        };
                d.draggable = true;
        d.addEventListener("dragstart", (e) => {
            if (confirmedTurn) { e.preventDefault(); return; }
            selectedSpecialIndex = i;
            selectedCardIndex = null;
            e.dataTransfer.effectAllowed = "move";
            d.classList.add("dragging");
        });
        d.addEventListener("dragend", () => {
            d.classList.remove("dragging");
        });
        div.appendChild(d);
    });
}

function updateBoardUI() {
    let lanes = document.getElementById("lanes").children;
    for (let i = 0; i < 3; i++) {
        let c = placedCards[i];
        let slot = lanes[i].children[2];
        slot.innerHTML = "";
        slot.classList.remove("place-slot");
        
        slot.onclick = () => {
            if (confirmedTurn) return;

            if (placedCards[i]) {
                let picked = placedCards[i];
                let isSpecial = picked.card.includes("Sentinel") || picked.card.includes("Initiator") || picked.card.includes("Controller");
                if (isSpecial) { specialHand.push(picked.card); selectedSpecialIndex = specialHand.length - 1; }
                else { hand.push(picked.card); selectedCardIndex = hand.length - 1; }
                placedCards[i] = null;
                if (picked.card === "Draw2 (Initiator)") { bonusDraw -= 2; }
                
                updateBoardUI(); updateHandUI(false); updateSpecialHandUI();
                
                setTimeout(() => {
                    let cards = document.querySelectorAll(isSpecial ? "#special-hand .card" : "#hand .card");
                    let idx = isSpecial ? selectedSpecialIndex : selectedCardIndex;
                    if(cards[idx]) cards[idx].classList.add("selected");
                }, 0);
                return;
            }
            
            if (selectedCardIndex === null && selectedSpecialIndex === null) return;
            placeCard(i);
        };
                slot.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            slot.style.borderColor = "#00ffcc";
            slot.style.boxShadow = "0 0 15px #00ffcc";
        });
        slot.addEventListener("dragleave", () => {
            slot.style.borderColor = "";
            slot.style.boxShadow = "";
        });
        slot.addEventListener("drop", (e) => {
            e.preventDefault();
            slot.style.borderColor = "";
            slot.style.boxShadow = "";
            if (confirmedTurn) return;
            if (placedCards[i]) return;
            if (selectedCardIndex === null && selectedSpecialIndex === null) return;
            placeCard(i);
        });
        if (!c) {
            slot.innerText = "+";
            slot.classList.add("place-slot");
        } else {
            if (cardImages[c.card]) {
                let img = document.createElement("img");
                img.src = cardImages[c.card];
                img.classList.add("place-pop");
                slot.appendChild(img);
            } else slot.innerText = c.card;
        }
    }
}

function revealEnemyCards() {
    let lanes = document.getElementById("lanes").children;
    for (let i = 0; i < 3; i++) {
        let c = enemyPlacedCards[i];
        let slot = lanes[i].children[1];
        slot.innerHTML = "";
        if (c) {
            if (cardImages[c.card]) {
                let img = document.createElement("img");
                img.style.opacity = 0;
                img.onload = () => {
                    setTimeout(() => {
                        img.classList.add("enemy-reveal");
                        img.style.opacity = 1;
                        const revealSfx = sfxHover.cloneNode();
                        revealSfx.volume = sfxHover.volume * 0.25;
                        revealSfx.play().catch(()=>{});
                    }, 150 + (i * 120));
                };
                img.src = cardImages[c.card];
                slot.appendChild(img);
            } else slot.innerText = c.card;
        } else slot.innerText = "?";
    }
}

function fadeOutActionCards() {
    let lanes = document.getElementById("lanes").children;
    for (let i = 0; i < 3; i++) {
        let enemyCard = lanes[i].children[1].querySelector("img");
        let playerCard = lanes[i].children[2].querySelector("img");
        if (enemyCard) enemyCard.classList.add("action-fade");
        if (playerCard) playerCard.classList.add("action-fade");
    }
}

// =====================
// COMBAT LOGIC (FIXED DEFLECT)
// =====================
function resolveCombat() {
    let lanes = document.getElementById("lanes").children;
    let fights = getMatchups();

    for (let f of fights) {
        let i = f.p; let j = f.e;
        let pC = placedCards[i]; let eC = enemyPlacedCards[j];
        let pA = playerAgents[i]; let eA = enemyAgents[j];

        if ((!pC && !eC) || (pA.hp === 0 && eA.hp === 0)) continue;
        let pCard = pC ? pC.card : null;
        let eCard = eC ? eC.card : null;
        let enemySlot = lanes[j].children[0];
        let playerSlot = lanes[i].children[3];

        // ATTACK VS ATTACK: No effect to either party
        if (isAttack(pCard) && isAttack(eCard)) {
            continue;
        }

        // =====================
        // PLAYER ATTACK SECTION
        // =====================
        if (pCard && pA.hp > 0 && eA.hp > 0 && isAttack(pCard)) {
            sfxAttack.currentTime = 0; sfxAttack.play().catch(()=>{});

            // DEFLECT CHECK: Enemy has Deflect — bounce damage back to player
            if (eCard === "Deflect (Controller)") {
                playerSlot.classList.add("hit");
                setTimeout(() => playerSlot.classList.remove("hit"), 300);
                if (pA.hp === 100) {
                    pA.hp = 1;
                } else {
                    pA.hp = 0;
                    justDiedPlayer[i] = true;
                    sfxDeath.currentTime = 0; sfxDeath.play().catch(()=>{});
                    triggerDeathAnimation(playerSlot);
                }
                continue; // Skip to next fight
            }

            // BLOCK CHECK: Enemy has BlockAttack — attack does nothing
            if (eCard === "BlockAttack (Sentinel)") {
                console.log("Attack Blocked by Sentinel");
                continue;
            }

            // Enemy has a compatible utility card — takes 99 damage (100→1)
            if (isCompatible(eCard, eA.name)) {
                enemySlot.classList.add("hit");
                setTimeout(() => enemySlot.classList.remove("hit"), 300);
                eA.hp = (eA.hp === 100) ? 1 : 0;
                if (eA.hp === 0) {
                    justDiedEnemy[j] = true;
                    sfxDeath.currentTime = 0; sfxDeath.play().catch(()=>{});
                    triggerDeathAnimation(enemySlot);
                }
                continue;
            }

            // Enemy has no card or incompatible utility — full kill
            enemySlot.classList.add("hit");
            setTimeout(() => enemySlot.classList.remove("hit"), 300);
            eA.hp = 0;
            justDiedEnemy[j] = true;
            sfxDeath.currentTime = 0; sfxDeath.play().catch(()=>{});
            triggerDeathAnimation(enemySlot);
        }

        // =====================
        // ENEMY ATTACK SECTION
        // =====================
        if (eCard && eA.hp > 0 && pA.hp > 0 && isAttack(eCard)) {
            sfxAttack.currentTime = 0; sfxAttack.play().catch(()=>{});

            // DEFLECT CHECK: Player has Deflect — bounce damage back to enemy
            if (pCard === "Deflect (Controller)") {
                enemySlot.classList.add("hit");
                setTimeout(() => enemySlot.classList.remove("hit"), 300);
                if (eA.hp === 100) {
                    eA.hp = 1;
                } else {
                    eA.hp = 0;
                    justDiedEnemy[j] = true;
                    sfxDeath.currentTime = 0; sfxDeath.play().catch(()=>{});
                    triggerDeathAnimation(enemySlot);
                }
                continue;
            }

            // BLOCK CHECK: Player has BlockAttack — attack does nothing
            if (pCard === "BlockAttack (Sentinel)") {
                console.log("Attack Blocked by Sentinel");
                continue;
            }

            // Player has a compatible utility card — takes 99 damage (100→1)
            if (isCompatible(pCard, pA.name)) {
                playerSlot.classList.add("hit");
                setTimeout(() => playerSlot.classList.remove("hit"), 300);
                pA.hp = (pA.hp === 100) ? 1 : 0;
                if (pA.hp === 0) {
                    justDiedPlayer[i] = true;
                    sfxDeath.currentTime = 0; sfxDeath.play().catch(()=>{});
                    triggerDeathAnimation(playerSlot);
                }
                continue;
            }

            // Player has no card or incompatible utility — full kill
            playerSlot.classList.add("hit");
            setTimeout(() => playerSlot.classList.remove("hit"), 300);
            pA.hp = 0;
            justDiedPlayer[i] = true;
            sfxDeath.currentTime = 0; sfxDeath.play().catch(()=>{});
            triggerDeathAnimation(playerSlot);
        }
    }
}

function getMatchups() {
    let pairs = [];
    for (let i = 0; i < 3; i++) {
        let pAlive = playerAgents[i] && playerAgents[i].hp > 0;
        let eAlive = enemyAgents[i] && enemyAgents[i].hp > 0;
        if (pAlive && eAlive) pairs.push({ p: i, e: i });
    }
    return pairs;
}

function triggerDeathAnimation(slot) {
    const deathSFX = document.getElementById("sfx-death");
    deathSFX.currentTime = 0;
    deathSFX.play().catch(() => {});

    slot.classList.add("shake");
    setTimeout(() => { slot.classList.remove("shake"); slot.classList.add("shatter"); }, 200);
    setTimeout(() => slot.classList.remove("shatter"), 700);
}

function checkWin() {
    let resultDiv = document.getElementById("result");
    let playerAlive = playerAgents.some(a => a.hp > 0);
    let enemyAlive = enemyAgents.some(a => a.hp > 0);

    if (!playerAlive || !enemyAlive) {
        gameOver = true;
        if (!playerAlive) {
            resultDiv.innerText = "YOU LOSE"; resultDiv.classList.add("lose");
        } else {
            resultDiv.innerText = "YOU WIN"; resultDiv.classList.add("win");
        }
        if(isHost) remove(roomRef);
    }
}

// =====================
// INIT
// =====================
drawAgentChoices();
